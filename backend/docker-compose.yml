services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: stock_kafka
    ports:
      - "9092:9092"   # Windows host & WSL truy cập qua port này
      - "29092:29092" # Internal Docker network
    # host.docker.internal trỏ đến Windows host IP, hoạt động cả trong Docker & WSL
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      # PLAINTEXT     -> dành cho client bên ngoài Docker (Windows host, WSL)
      # PLAINTEXT_INT -> dành cho Spark container bên trong Docker network
      # CONTROLLER    -> dành cho KRaft controller internal
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_INT://:29092'
      # host.docker.internal: resolve đúng cả từ WSL lẫn Windows host
      # WSL client kết nối qua Windows host IP, metadata trả về host.docker.internal:9092
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://host.docker.internal:9092,PLAINTEXT_INT://kafka:29092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_INT:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    restart: always

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka_ui
    ports:
      - "8085:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local-kraft-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092  # dùng internal listener
    depends_on:
      - kafka
    restart: always

  spark-master:
    image: apache/spark:latest
    container_name: spark_master
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    environment:
      - SPARK_PUBLIC_DNS=localhost
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    volumes:
      - .:/app
    depends_on:
      - kafka
    restart: always

  spark-worker:
    image: apache/spark:latest
    container_name: spark_worker
    ports:
      - "8081:8081"
    environment:
      - SPARK_PUBLIC_DNS=localhost
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    volumes:
      - .:/app
    depends_on:
      - spark-master
      - kafka
    restart: always
